<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SPX Schwab IC Recommender</title>
<style>
body{font-family:Arial;background:#080b18;color:#f2f5ff;margin:0}
header{padding:18px 24px;background:#060817;border-bottom:1px solid #28314f}
main{padding:22px}.card{background:#11162a;border:1px solid #28314f;border-radius:8px;padding:16px;margin-bottom:16px}
.controls{display:flex;gap:14px;flex-wrap:wrap;align-items:end}label{display:flex;flex-direction:column;gap:6px;color:#9aa6c5;font-size:12px;font-weight:bold}
input{background:#080b18;color:white;border:1px solid #28314f;border-radius:8px;padding:8px;width:112px}button{padding:10px 18px;border:0;border-radius:8px;background:#4da3ff;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#70b6ff}.grid{display:flex;gap:14px;flex-wrap:wrap}.metric{background:#171d34;border:1px solid #28314f;border-radius:8px;padding:12px;min-width:140px}
.metric b{display:block;color:#9aa6c5;font-size:12px}.metric span{font-size:22px}.metric small{display:block;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #28314f;padding:8px;text-align:right;white-space:nowrap}th{background:#171d34;color:#d8def5}td:first-child,th:first-child{text-align:center}
.good{color:#24d17e;font-weight:bold}.bad{color:#ff4d6d}.muted{color:#9aa6c5}.table-wrap{overflow:auto}small{color:#9aa6c5}
</style>
</head>
<body>
<header>
<h1>SPX Schwab Iron Condor Recommender</h1>
<small>Read-only Schwab option-chain scanner. It recommends candidates. It does not trade for you, because lawsuits and common sense.</small>
</header>
<main>
<div class="card controls">
  <label>Symbol <input id="symbol" value="SPX"></label>
  <label>DTE <input id="dte" type="number" value="0"></label>
  <label>Wing Width <input id="wing" type="number" value="25"></label>
  <label>Min Credit <input id="credit" type="number" value="0.80" step="0.05"></label>
  <label>Max Bid/Ask Spread <input id="spread" type="number" value="2.00" step="0.05"></label>
  <label>Min IV Rank <input id="minIvRank" type="number" placeholder="0" min="0" max="100" step="1"></label>
  <label>Max IV Rank <input id="maxIvRank" type="number" placeholder="100" min="0" max="100" step="1"></label>
  <button onclick="loadRecs()">Scan Option Chain</button>
</div>
<div class="card"><div id="status">Waiting. Somehow that is the most stable state of software.</div><div class="grid" id="metrics"></div></div>
<div class="card table-wrap">
  <table id="table"><thead><tr>
    <th>Rank</th><th>Grade</th><th>LP</th><th>SP</th><th>SC</th><th>LC</th><th>Credit</th><th>Max Profit</th><th>Max Loss</th><th>B/E</th><th>Nearest Buffer</th><th>POP</th><th>Avg Spread</th><th>Score</th>
  </tr></thead><tbody></tbody></table>
</div>
</main>
<script>
function money(x){return "$"+Number(x).toFixed(0);}
function dec(x){return Number(x || 0).toFixed(2);}
function paramIfPresent(params, name, value){if(value !== "" && value !== null && value !== undefined){params.set(name, value);}}
async function loadRecs(){
  var s=document.getElementById("symbol").value;
  var d=document.getElementById("dte").value;
  var w=document.getElementById("wing").value;
  var c=document.getElementById("credit").value;
  var spr=document.getElementById("spread").value;
  var minIv=document.getElementById("minIvRank").value;
  var maxIv=document.getElementById("maxIvRank").value;
  document.getElementById("status").innerHTML="Scanning Schwab option chain...";
  document.querySelector("#table tbody").innerHTML="";
  document.getElementById("metrics").innerHTML="";
  try{
    var params = new URLSearchParams({symbol:s,dte:d,wing_width:w,min_credit:c,max_spread:spr,strike_count:"50",count:"12",buffer_mult:"1.0"});
    paramIfPresent(params, "min_iv_rank", minIv);
    paramIfPresent(params, "max_iv_rank", maxIv);
    var res=await fetch("/api/recommend?" + params.toString());
    var data=await res.json();
    if(data.error){throw new Error(data.error)}
    document.getElementById("status").innerHTML="Found " + data.total_found + " candidates. Showing top " + data.results.length + ".";
    var ivSource = data.iv_rank_source === "current_iv_proxy" ? "Current IV proxy" : "Schwab field";
    document.getElementById("metrics").innerHTML =
      '<div class="metric"><b>Underlying</b><span>' + dec(data.underlying) + '</span></div>' +
      '<div class="metric"><b>Expiration</b><span>' + data.expiration + '</span></div>' +
      '<div class="metric"><b>IV</b><span>' + dec(data.iv) + '%</span></div>' +
      '<div class="metric"><b>IV Rank</b><span>' + dec(data.iv_rank) + '</span><small>' + ivSource + '</small></div>' +
      '<div class="metric"><b>Expected Move</b><span>+/-' + dec(data.expected_move) + '</span></div>';
    if (data.rejects) {
      document.getElementById("metrics").innerHTML +=
        '<div class="metric"><b>Why no candidates?</b><span>' +
        'Credit low: ' + data.rejects.credit_too_low + '<br>' +
        'Spread wide: ' + data.rejects.bid_ask_too_wide + '<br>' +
        'Missing price: ' + data.rejects.missing_mid_price + '<br>' +
        'Buffer small: ' + data.rejects.buffer_too_small + '<br>' +
        'No wing match: ' + data.rejects.no_matching_wing + '</span></div>';
    }
    var rows=data.results.map(function(r,i){
      return '<tr title="Buffer/EM ' + r.em_buffer_ratio + '; delta quality ' + r.delta_quality + '; symmetry ' + r.symmetry + '; spread quality ' + r.spread_quality + '">' +
        '<td>' + (i+1) + '</td><td class="good">' + r.grade + '</td><td>' + r.long_put + '</td><td>' + r.short_put + '</td><td>' + r.short_call + '</td><td>' + r.long_call + '</td>' +
        '<td class="good">' + dec(r.credit) + '</td><td class="good">' + money(r.max_profit) + '</td><td class="bad">' + money(r.max_loss) + '</td>' +
        '<td>' + dec(r.lower_be) + ' / ' + dec(r.upper_be) + '</td><td>' + dec(r.nearest_buffer) + '</td><td>' + dec(r.condor_pop) + '%</td><td>' + dec(r.avg_leg_spread) + '</td><td class="good">' + r.score + '</td></tr>';
    }).join("");
    document.querySelector("#table tbody").innerHTML=rows || '<tr><td colspan="14" class="muted">No candidates matched the current filters.</td></tr>';
  }catch(err){document.getElementById("status").innerHTML="Error: "+err.message;}
}
</script>
</body>
</html>
